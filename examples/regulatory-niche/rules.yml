# Example: NCUA keyword weights and scoring thresholds
#
# Tuned for credit union regulatory intelligence. Terms like "conservatorship"
# and "civil money penalty" are high-signal; generic finance terms score lower
# so routine housekeeping items don't crowd out enforcement news.

scoring:
  threshold: 0.5   # higher than the generic default — NCUA feed is low-noise
  max_items: 25

keywords:
  # Core NCUA/credit-union terms
  credit union: 2.0
  ncua: 2.0
  conservatorship: 3.0
  liquidation: 2.5
  civil money penalty: 2.5
  share insurance: 2.0
  prompt corrective action: 2.5
  net worth: 1.5
  corporate credit union: 2.0
  field of membership: 1.5
  chartering: 1.5
  examination: 1.5
  merger: 1.5
  # General regulatory signal
  enforcement: 2.0
  violation: 2.0
  order: 1.0
  compliance: 1.5
  guidance: 1.0
  rule: 1.0
  proposed: 0.5
  final: 0.5
  penalty: 1.5
  settlement: 1.5

source_trust:
  default: 1.0
