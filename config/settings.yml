# USER EDITS: dashboard title, schedule, and model selection

dashboard:
  title: SmartKit Intelligence Dashboard
  subtitle: Regulatory & Compliance Monitor
  schedule_note: Updated every 6 hours via GitHub Actions

model:
  # Tier 1 (default once key is added): free OpenRouter model.
  # Add OPENROUTER_API_KEY as a GitHub repo secret to enable.
  # Free-tier model availability rotates — update "name" if this one is retired.
  # Current free models: https://openrouter.ai/models?q=:free
  name: meta-llama/llama-3.1-8b-instruct:free
  max_tokens: 512
  timeout_seconds: 30

  # Tier 2 (BYOK/model): change "name" to any OpenRouter-compatible model string.
  # To use a different provider's endpoint, uncomment and set base_url:
  # base_url: https://api.openai.com/v1        # OpenAI
  # base_url: https://api.anthropic.com/v1     # Anthropic (Claude)
  # The Authorization: Bearer <key> header format is used for all providers.
