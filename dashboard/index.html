<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartKit Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2d3148;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent: #6366f1;
      --accent-dim: #4f52c0;
      --tag-bg: #252840;
      --green: #22c55e;
      --amber: #f59e0b;
      --slate: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    .subtitle { color: var(--muted); font-size: 0.875rem; }
    .meta-bar {
      padding: 9px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }
    .meta-bar strong { color: var(--text); }
    .filter-bar {
      padding: 12px 32px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar input,
    .filter-bar select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 11px;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .filter-bar input { width: 260px; }
    .filter-bar input::placeholder { color: var(--muted); }
    #count { font-size: 0.78rem; color: var(--muted); padding: 0 32px 6px; }
    main { padding: 8px 32px 56px; max-width: 1060px; }
    .empty { color: var(--muted); padding: 56px 0; text-align: center; line-height: 2; }
    .empty code { background: var(--surface); padding: 2px 6px; border-radius: 4px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 10px;
      transition: border-color 0.12s;
    }
    .card:hover { border-color: var(--accent-dim); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .card-title { font-size: 0.96rem; font-weight: 600; flex: 1; }
    .card-title a { color: var(--text); text-decoration: none; }
    .card-title a:hover { color: var(--accent); text-decoration: underline; }
    .score-badge {
      font-size: 0.72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 12px;
      white-space: nowrap; flex-shrink: 0;
    }
    .score-high { background: #14532d; color: var(--green); }
    .score-mid  { background: #451a03; color: var(--amber); }
    .score-low  { background: #1e293b; color: var(--slate); }
    .card-summary { color: var(--muted); font-size: 0.84rem; margin: 8px 0 10px; }
    .card-meta { display: flex; gap: 10px; font-size: 0.76rem; color: var(--muted); flex-wrap: wrap; align-items: center; }
    .tag { background: var(--tag-bg); color: #a5b4fc; padding: 2px 7px; border-radius: 4px; font-size: 0.71rem; }
    .action-tag { background: #1e1b4b; color: #c7d2fe; }
  </style>
</head>
<body>
  <header>
    <h1 id="dash-title">SmartKit Dashboard</h1>
    <span class="subtitle" id="dash-subtitle"></span>
  </header>
  <div class="meta-bar">
    <span>Generated: <strong id="generated-at">—</strong></span>
    <span>Items: <strong id="item-count">—</strong></span>
    <span id="schedule-note"></span>
  </div>
  <div class="filter-bar">
    <input type="text" id="search" placeholder="Filter by keyword…">
    <select id="type-filter">
      <option value="">All action types</option>
      <option value="enforcement">Enforcement</option>
      <option value="rulemaking">Rulemaking</option>
      <option value="guidance">Guidance</option>
      <option value="settlement">Settlement</option>
      <option value="other">Other</option>
    </select>
    <select id="source-filter"><option value="">All sources</option></select>
  </div>
  <div id="count"></div>
  <main id="cards"></main>
  <!-- data/latest.js sets window.SMARTKIT_DATA; script tags work with file:// -->
  <script src="../data/latest.js"></script>
  <script src="app.js"></script>
</body>
</html>
